name: Build apps

# Builds a self-contained, no-Python-needed executable for Windows, macOS, and Linux.
# Run it from the Actions tab ("Run workflow"), or push a tag like v0.1.0. Download the finished
# apps from the run's "Artifacts" section.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Opt the JavaScript actions into the Node 24 runtime now (Node 20 is deprecated June 2026),
# which clears the deprecation warnings and future-proofs the build.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build the executable
        run: pyinstaller --noconfirm schedule_tool.spec
      - name: Upload the app
        uses: actions/upload-artifact@v4
        with:
          name: ScheduleTool-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error
